<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Il Ponte Vecchio — Giovanni</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

   .chat-wrapper {
  width: 100%;
  max-width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: #fff;
    }

    .chat-header {
      background: #8B0000;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .header-info .name {
      color: white;
      font-size: 16px;
      font-weight: 600;
    }

    .header-info .sub {
      color: rgba(255,255,255,0.8);
      font-size: 12px;
      margin-top: 2px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #f5f0eb;
    }

    .msg {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .msg.bot {
      background: #fff;
      border: 1px solid #e0d8d0;
      border-radius: 4px 18px 18px 18px;
      align-self: flex-start;
      color: #222;
      white-space: normal;
    }

    .msg.user {
      background: #8B0000;
      color: white;
      border-radius: 18px 4px 18px 18px;
      align-self: flex-end;
    }

    .msg.bot table {
      width: 100%;
      border-collapse: collapse;
      margin: 8px 0;
      font-size: 13px;
    }

    .msg.bot th, .msg.bot td {
      padding: 6px 10px;
      border: 1px solid #e0d8d0;
      text-align: left;
    }

    .msg.bot th {
      background: #f5f0eb;
      font-weight: 600;
    }

    .msg.bot strong {
      font-weight: 600;
      color: #8B0000;
    }

    .msg.bot hr {
      border: none;
      border-top: 1px solid #e0d8d0;
      margin: 8px 0;
    }

    .msg.bot p {
      margin-bottom: 6px;
    }

    .msg.bot p:last-child {
      margin-bottom: 0;
    }

    .typing {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 12px 16px;
      background: #fff;
      border-radius: 4px 18px 18px 18px;
      align-self: flex-start;
      border: 1px solid #e0d8d0;
    }

    .typing span {
      width: 8px;
      height: 8px;
      background: #8B0000;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-self: flex-start;
    }

    .quick-btn {
      background: white;
      border: 1.5px solid #8B0000;
      color: #8B0000;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .quick-btn:hover {
      background: #8B0000;
      color: white;
    }

    .chat-input-area {
      padding: 12px 16px;
      background: white;
      border-top: 1px solid #e0d8d0;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .chat-input-area input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 14px;
      outline: none;
      background: #f9f9f9;
    }

    .chat-input-area input:focus {
      border-color: #8B0000;
      background: white;
    }

    .send-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #8B0000;
      border: none;
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .send-btn:hover { background: #6b0000; }
  </style>
</head>
<body>

<div class="chat-wrapper">
  <div class="chat-header">
    <div class="header-avatar">🍕</div>
    <div class="header-info">
      <div class="name">Giovanni</div>
      <div class="sub">Il Ponte Vecchio Pizzeria & Trattoria</div>
    </div>
  </div>

  <div class="chat-messages" id="messages"></div>

  <div class="chat-input-area">
    <input type="text" id="userInput" placeholder="Escribí tu mensaje..." />
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  let history = [];

  const messagesEl = document.getElementById('messages');
  const input = document.getElementById('userInput');

  function addMessage(text, sender) {
    const div = document.createElement('div');
    div.className = `msg ${sender}`;
    if (sender === 'bot') {
      div.innerHTML = marked.parse(text);
    } else {
      div.textContent = text;
    }
    messagesEl.appendChild(div);
    scrollBottom();
  }

  function addTyping() {
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    messagesEl.appendChild(div);
    scrollBottom();
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function addQuickReplies(options) {
    const div = document.createElement('div');
    div.className = 'quick-replies';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'quick-btn';
      btn.textContent = opt;
      btn.onclick = () => { div.remove(); handleSend(opt); };
      div.appendChild(btn);
    });
    messagesEl.appendChild(div);
    scrollBottom();
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function handleSend(text) {
    addMessage(text, 'user');
    history.push({ role: 'user', content: text });
    addTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });

      const data = await res.json();
      removeTyping();

      if (data.reply) {
        addMessage(data.reply, 'bot');
        history.push({ role: 'assistant', content: data.reply });
      } else {
        addMessage('Ups, hubo un error. Intentá de nuevo.', 'bot');
      }
    } catch (e) {
      removeTyping();
      addMessage('Ups, hubo un error. Intentá de nuevo.', 'bot');
    }
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    await handleSend(text);
  }

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMessage();
  });

  async function init() {
    addTyping();
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: [{ role: 'user', content: 'hola' }] })
      });
      const data = await res.json();
      removeTyping();
      if (data.reply) {
        history.push({ role: 'user', content: 'hola' });
        history.push({ role: 'assistant', content: data.reply });
        addMessage(data.reply, 'bot');
        addQuickReplies(['Ver el menú 🍕', 'Quiero pedir', '¿Hacen delivery?', '¿Cuál es el horario?']);
      }
    } catch(e) {
      removeTyping();
      addMessage('¡Benvenuto a Il Ponte Vecchio! Soy Giovanni, ¿en qué te puedo ayudar hoy? 🍕', 'bot');
      addQuickReplies(['Ver el menú 🍕', 'Quiero pedir', '¿Hacen delivery?', '¿Cuál es el horario?']);
    }
  }

  init();
</script>
</body>
</html>
